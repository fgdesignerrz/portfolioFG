<style>
  html, body { margin: 0; padding: 0; background: var(--surface-page); }
  * { box-sizing: border-box; }
  ::selection { background: var(--accent-soft); color: var(--text-strong); }
  img { max-width: 100%; }

  /* --- splash --- */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    background:
      radial-gradient(55% 50% at 50% 30%, rgba(142,123,255,0.18), transparent 70%),
      radial-gradient(ellipse at bottom, #12122A 0%, #050509 100%);
    transition: opacity .5s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash img { height: 84px; animation: splashPulse 1.8s ease-in-out infinite; }
  #splash .lbl { font-family: var(--font-mono); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted); }
  @keyframes splashPulse { 0%,100% { opacity: .55; transform: scale(.98); } 50% { opacity: 1; transform: scale(1); } }
  @media (prefers-reduced-motion: reduce) { #splash img { animation: none; } }

  /* --- reveal on scroll (armado por JS; sem JS o conteúdo fica visível) --- */
  .fg-reveal { transition: opacity .9s var(--ease-out), transform .9s var(--ease-out); }
  .fg-reveal-ready .fg-reveal:not(.is-visible) { opacity: 0; transform: translateY(28px); }

  /* --- mascote: balanço em CSS (fallback se o GSAP não carregar) --- */
  @keyframes fg-climber-swing { 0%,100% { transform: rotate(9deg); } 50% { transform: rotate(-9deg); } }
  .fg-climber-icon:active { cursor: grabbing; }

  /* --- carrossel mobile (esconde a barra de rolagem) --- */
  .fg-hscroll { scrollbar-width: none; -ms-overflow-style: none; }
  .fg-hscroll::-webkit-scrollbar { display: none; }

  /* --- entrada da tela de detalhe de projeto --- */
  .fg-detail-enter { animation: fgDetailIn .35s var(--ease-out) both; }
  @keyframes fgDetailIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  /* --- troca de filtro nos trabalhos: fade sutil --- */
  .fg-grid-swap { animation: fgGridSwap .38s var(--ease-out) both; }
  @keyframes fgGridSwap { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .fg-detail-enter, .fg-grid-swap { animation: none; } }
</style>

<body>
<div id="splash">
  <img src="assets/fg-logo-stellar.svg" alt="FG Designs">
  <span class="lbl">Carregando o cosmos…</span>
</div>
<div id="root"></div>

<script type="text/babel" src="site-core.jsx"></script>
<script type="text/babel" src="site-sections.jsx"></script>
<script type="text/babel" src="site-extras.jsx"></script>
<script type="text/babel" src="site-climber.jsx"></script>
<script type="text/babel" src="site-contact.jsx"></script>
<script type="text/babel">
  (function () {
    var tries = 0;
    function ready() {
      return window.FGApp && window.Nav && window.Hero && window.ShowReel && window.Services &&
             window.Works && window.LiveSites && window.Testimonials && window.Pricing && window.WorkDetail &&
             window.About && window.Process &&
             window.Contact && window.CosmicClimber && window.FGDesignsCosmosDesignSystem_29e3f7 && window.FG_DATA;
    }
    function hideSplash() {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('hide'); setTimeout(function () { s.remove(); }, 550); }
    }
    function mount() {
      if (ready()) {
        try {
          ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.FGApp));
          hideSplash();
        } catch (err) {
          console.error('FG site mount error:', err);
          setTimeout(mount, 120);
        }
        return;
      }
      if (tries++ > 200) {
        var lbl = document.querySelector('#splash .lbl');
        if (lbl) lbl.textContent = 'Recarregue a página se demorar…';
        console.error('FG site: componentes não carregaram a tempo.');
        return;
      }
      setTimeout(mount, 50);
    }
    mount();
  })();
</script>
</body>
